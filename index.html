                placeholderCustom: "Nome nuova sezione",
                // Dynamic Examples
                valName: "Giovanni Rossi",
                valTitle: "Sviluppatore Web / UI Designer",
                valEmail: "giovanni.rossi@example.com",
                valPhone: "+39 02 1234567",
                valAbout: "Sviluppatore software orientato ai risultati, specializzato nella creazione di interfacce web moderne, veloci e centrate sull'utente.",
                valExp: "• Sviluppo Digitale S.R.L. - Web Developer (2023 - Presente)\n• Sviluppo e ottimizzazione di portali aziendali ad alto traffico.\n• Studio Web Milano - Junior Dev (2021 - 2023)",
                valEdu: "• Laurea in Informatica - Politecnico di Milano\n• Certificazione Professionale Scrum",
                valSkills: "HTML, CSS, JavaScript, React, Node.js, Git, Problem Solving"
            }
        };

        let currentLang = 'ar';

        // دالة تغيير اللغة الشاملة التي تقوم بتحديث الواجهات والأمثلة داخل المربعات فورياً
        function changeLanguage(lang) {
            currentLang = lang;
            const data = translations[lang];
            
            // 1. تحديث اتجاه لغة الصفحة (RTL أو LTR)
            const htmlTag = document.getElementById('htmlTag');
            htmlTag.setAttribute('dir', data.dir);
            htmlTag.setAttribute('lang', lang);

            // 2. تحديث نصوص واجهة البرنامج الثابتة
            for (let key in data) {
                const el = document.getElementById(key);
                if (el && !key.startsWith('val')) {
                    el.innerText = data[key];
                }
            }
            
            document.getElementById('customSectionTitle').placeholder = data.placeholderCustom;

            // 3. التحديث الذكي والحي لقيم مربعات الإدخال بالأمثلة الجديدة للغة المختارة
            document.getElementById('inputName').value = data.valName;
            document.getElementById('inputTitle').value = data.valTitle;
            document.getElementById('inputEmail').value = data.valEmail;
            document.getElementById('inputPhone').value = data.valPhone;
            document.getElementById('inputAbout').value = data.valAbout;
            document.getElementById('inputExperience').value = data.valExp;
            document.getElementById('inputEducation').value = data.valEdu;
            document.getElementById('inputSkills').value = data.valSkills;

            // محاذاة النص التلقائي حسب لغة الإدخال المعتمدة
            const allInputs = document.querySelectorAll('input[type="text"], input[type="email"], input[type="tel"], textarea');
            allInputs.forEach(input => {
                input.style.textAlign = data.dir === 'rtl' ? 'right' : 'left';
            });

            // 4. تحديث ورقة المعاينة الحية فوراً لتعكس القيم الجديدة للغة المحددة
            updateAllPreviews();

            // 5. تمييز الزر النشط للغة بلمسة بصرية نيون ساحرة
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.className = "bg-slate-800 text-slate-400 font-medium py-1.5 px-4 rounded-xl border border-slate-700 hover:bg-slate-700 transition-all cursor-pointer lang-btn";
            });
            const activeBtn = document.getElementById(`btn-${lang}`);
            if (activeBtn) {
                activeBtn.className = "bg-indigo-600 text-white font-medium py-1.5 px-4 rounded-xl border border-indigo-500 shadow-lg shadow-indigo-500/20 transition-all cursor-pointer lang-btn";
            }
        }

        // دالة لنقل البيانات من لوحة الإدخال إلى ورقة المعاينة الـ CV
        function updateAllPreviews() {
            document.getElementById('viewName').innerText = document.getElementById('inputName').value;
            document.getElementById('viewTitle').innerText = document.getElementById('inputTitle').value;
            document.getElementById('viewEmail').innerText = "📧 " + document.getElementById('inputEmail').value;
            document.getElementById('viewPhone').innerText = "📞 " + document.getElementById('inputPhone').value;
            document.getElementById('viewAbout').innerText = document.getElementById('inputAbout').value;
            document.getElementById('viewExperience').innerText = document.getElementById('inputExperience').value;
            document.getElementById('viewEducation').innerText = document.getElementById('inputEducation').value;
            
            updateSkillsBadges();
        }

        // كبسولات المهارات التفاعلية
        function updateSkillsBadges() {
            const viewSkills = document.getElementById('viewSkills');
            const skillsVal = document.getElementById('inputSkills').value;
            const skillsArray = skillsVal.split(',').map(s => s.trim()).filter(s => s !== '');
            
            viewSkills.innerHTML = '';
            skillsArray.forEach(skill => {
                const span = document.createElement('span');
                span.className = 'bg-slate-100 text-slate-700 text-xs px-2.5 py-1 rounded font-medium animate__animated animate__fadeIn';
                span.innerText = skill;
                viewSkills.appendChild(span);
            });
        }

        // مستمعو الأحداث لتحديث المعاينة بشكل حي عند كتابة المستخدم
        const baseFields = ['inputName', 'inputTitle', 'inputEmail', 'inputPhone', 'inputAbout', 'inputExperience', 'inputEducation'];
        baseFields.forEach(id => {
            document.getElementById(id).addEventListener('input', updateAllPreviews);
        });
        document.getElementById('inputSkills').addEventListener('input', updateSkillsBadges);

        // تشغيل التطبيق باللغة العربية كـ لغة افتراضية مع جلب أمثلتها فوراً عند فتح الموقع لأول مرة
        changeLanguage('ar');

        // إضافة قسم مخصص بشكل ديناميكي كامل ومتعدد اللغات
        let customSectionCount = 0;
        function addNewSection() {
            const titleInput = document.getElementById('customSectionTitle');
            const title = titleInput.value.trim();
            
            if (!title) {
                const alertMsg = currentLang === 'ar' ? 'الرجاء كتابة اسم للقسم الجديد أولاً!' : 'Please enter a section name first!';
                alert(alertMsg);
                return;
            }

            customSectionCount++;
            const sectionId = `custom_sec_${customSectionCount}`;

            const formContainer = document.getElementById('dynamicSections');
            const newFormGroup = document.createElement('div');
            newFormGroup.className = 'bg-slate-800/40 p-4 rounded-xl border border-indigo-900/40 relative animate__animated animate__fadeInUp';
            newFormGroup.id = `form_group_${sectionId}`;
            newFormGroup.innerHTML = `
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-sm font-bold text-indigo-400">${title}</label>
                    <button onclick="removeSection('${sectionId}')" class="text-xs text-red-400 hover:text-red-500 cursor-pointer">❌</button>
                </div>
                <textarea id="input_${sectionId}" rows="2" placeholder="..." class="w-full bg-slate-800/80 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-indigo-500 transition-all"></textarea>
            `;
            formContainer.appendChild(newFormGroup);

            const previewContainer = document.getElementById('previewDynamicContainer');
            const newPreviewGroup = document.createElement('div');
            newPreviewGroup.id = `preview_group_${sectionId}`;
            newPreviewGroup.className = 'animate__animated animate__fadeIn';
            newPreviewGroup.innerHTML = `
                <h4 class="text-xs font-bold uppercase text-slate-400 tracking-wider mb-1.5 border-r-4 border-indigo-500 pr-2">${title}</h4>
                <p id="view_${sectionId}" class="text-slate-600 text-sm leading-relaxed whitespace-pre-line">• ...</p>
            `;
            previewContainer.appendChild(newPreviewGroup);

            const newInput = document.getElementById(`input_${sectionId}`);
            const newView = document.getElementById(`view_${sectionId}`);
            
            newInput.addEventListener('input', () => {
                newView.innerText = newInput.value.trim() === '' ? `• ...` : newInput.value;
            });

            titleInput.value = '';
        }

        function removeSection(id) {
            document.getElementById(`form_group_${id}`)?.remove();
            document.getElementById(`preview_group_${id}`)?.remove();
        }

        // حفظ كـ PDF نقي
        function downloadPDF() {
            const element = document.getElementById('cvPreview');
            const opt = {
                margin:       0,
                filename:     currentLang === 'ar' ? 'السيرة_الذاتية.pdf' : 'CV_Global.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
